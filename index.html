<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>MDI SYSTEM</title>

<style>
body{margin:0;font-family:Arial;background:#dbeafe;color:#0f172a;}
header{background:#1e3a8a;color:white;padding:15px 25px;display:flex;justify-content:space-between;align-items:center;}
.header-left{display:flex;align-items:center;gap:10px;}
.header-left img{width:45px;}
.layout{display:flex;min-height:calc(100vh - 70px);}
.sidebar{width:260px;background:white;padding:20px;border-right:1px solid #cbd5e1;}
.sidebar button{width:100%;padding:12px;margin-bottom:12px;background:#bfdbfe;border:none;border-radius:8px;cursor:pointer;}
.content{flex:1;padding:30px;}
.card{background:white;padding:15px;border-radius:10px;margin-bottom:15px;box-shadow:0 2px 6px rgba(0,0,0,0.1);}
input,select,textarea{width:100%;padding:10px;margin-bottom:15px;border:1px solid #93c5fd;border-radius:8px;}
textarea{min-height:120px;}
.hidden{display:none;}
button.primary{background:#1e3a8a;color:white;border:none;padding:10px;border-radius:8px;cursor:pointer;}
.files-container{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:15px;max-height:500px;overflow-y:auto;}
.file-card{background:white;padding:15px;border-radius:10px;box-shadow:0 2px 6px rgba(0,0,0,0.1);}
.login-box{max-width:400px;margin:100px auto;background:white;padding:30px;border-radius:15px;box-shadow:0 4px 10px rgba(0,0,0,0.1);text-align:center;}
</style>
</head>
<body>

<header>
<div class="header-left">
<img src="https://raw.githubusercontent.com/jvxtgzg/MDI-SYSTEMS/main/BRO%20LOGO.png">
<div>
<strong>MDI SYSTEM</strong><br>
<small>Mobile Data Investigation System</small>
</div>
</div>
<div>BRO – Bureau of Response Operative</div>
</header>

<!-- LOGIN -->
<div id="loginScreen" class="login-box">
<h2>Agent Login</h2>
<input type="text" id="codeName" placeholder="Code Name">
<input type="text" id="callSign" placeholder="Call Sign">
<button class="primary" onclick="login()">Login</button>
<p id="loginError" style="color:red;display:none;">Login Failed</p>
</div>

<!-- APP -->
<div id="app" class="hidden">
<div class="layout">

<div class="sidebar">
<div id="userInfo" style="margin-bottom:20px;font-weight:bold;"></div>
<button onclick="showDashboard()">Dashboard</button>
<button onclick="showNewReport()">New Report</button>
<button onclick="showFiles()">Files</button>
<button onclick="showContributor()">Contributor</button>
<button onclick="logout()">Logout</button>
</div>

<div class="content">

<!-- DASHBOARD -->
<div id="dashboard">
<h2>Dashboard</h2>

<div class="card">
<strong>Agents Data BRO</strong><br><br>
<a href="http://bro-membedata-imerp.my.id/" target="_blank">
<button class="primary">Open Agents Data</button>
</a>
</div>

<div class="card">
<strong>Security PIN</strong><br><br>
<input type="password" id="pinDisplay" readonly>
<button class="primary" onclick="togglePIN()">Lihat PIN</button>
<div id="pinUpdateSection" style="margin-top:15px;display:none;">
<input type="text" id="newPinInput" placeholder="New PIN">
<button class="primary" onclick="updatePIN()">Update PIN</button>
</div>
</div>
</div>

<!-- NEW REPORT -->
<div id="newReport" class="hidden">
<h2>New Investigation Report</h2>
<input type="text" id="missionName" placeholder="Mission Name">
<input type="date" id="date">
<textarea id="reportDetail" placeholder="Report Detail"></textarea>
<textarea id="intelInfo" placeholder="Intel Info"></textarea>
<input type="text" id="agentsInvolved" placeholder="Agents (comma separated)">
<select id="status">
<option value="OPEN">OPEN</option>
<option value="CLOSED">CLOSED</option>
</select>
<input type="text" id="evidenceLink" placeholder="CDN Evidence Link">
<button onclick="addEvidence()">Add Evidence</button>
<div id="evidencePreview"></div>
<button class="primary" onclick="saveReport()">Save Report</button>
</div>

<!-- FILES -->
<div id="filesPage" class="hidden">
<h2 style="display:flex;justify-content:space-between;">
<span>Files</span>
<button class="primary" onclick="loadFiles()">🔄 Refresh</button>
</h2>
<input type="text" id="fileSearchInput" placeholder="Search Case ID / Mission" oninput="filterFiles()">
<div id="filesList" class="files-container"></div>
</div>

<!-- CONTRIBUTOR -->
<div id="contributorPage" class="hidden">
<h2>Agent Contributor</h2>
<input type="text" id="agentSearchInput" placeholder="Search Agent Name" oninput="filterAgents()">
<div id="agentResult"></div>
</div>

</div>
</div>
</div>

<script>

const MEMBER_SHEET_ID="1yVsYlFJkPeIp6p3LApsiW4Ivv_5XihznO7BJLf_VRsY";
const DATA_SHEET_ID="1QgVdZ2Xtj2zskCG_lXPs9joVnNNZ9F19mxVVHbygtt8";
const API_URL="https://script.google.com/macros/s/AKfycbxkFsuKuIsQl_x5dSgJECX_CRHEb2j8o3AytO4vVq2HDE72C55AdoxLrxMihiuyvlfFuw/exec";

let currentUser=null;
let currentPIN="BRO-2026";
let pinVisible=false;
let evidenceArray=[];
let allFiles=[];

/* LOGIN */
async function login(){
const code=codeName.value.trim().toUpperCase();
const call=callSign.value.trim();
const res=await fetch(`https://docs.google.com/spreadsheets/d/${MEMBER_SHEET_ID}/gviz/tq?tqx=out:json`);
const text=await res.text();
const json=JSON.parse(text.substring(text.indexOf("{"), text.lastIndexOf("}")+1));
for(let r of json.table.rows){
if((r.c[1]?.v||"").toUpperCase()===code && (r.c[2]?.v||"")==call){
currentUser={codeName:code,rank:(r.c[3]?.v||"").toUpperCase()};
break;
}}
if(currentUser){
loginScreen.classList.add("hidden");
app.classList.remove("hidden");
userInfo.innerHTML=currentUser.codeName+" ("+currentUser.rank+")";
pinDisplay.value=currentPIN;
if(["CHIEF","DIRECTOR","DEPUTY DIRECTOR"].includes(currentUser.rank)){
pinUpdateSection.style.display="block";
}
}else loginError.style.display="block";
}

/* PIN */
function togglePIN(){
pinDisplay.type=pinVisible?"password":"text";
pinVisible=!pinVisible;
}
function updatePIN(){
if(!["CHIEF","DIRECTOR","DEPUTY DIRECTOR"].includes(currentUser.rank)) return alert("Access Denied");
let newPin=newPinInput.value.trim();
if(!newPin) return;
currentPIN=newPin;
pinDisplay.value=currentPIN;
alert("PIN Updated");
}

/* NAV */
function showSection(id){
["dashboard","newReport","filesPage","contributorPage"]
.forEach(x=>document.getElementById(x).classList.add("hidden"));
document.getElementById(id).classList.remove("hidden");
}
function showDashboard(){showSection("dashboard");}
function showNewReport(){showSection("newReport");}
function showFiles(){showSection("filesPage"); loadFiles();}
function showContributor(){showSection("contributorPage");}
function logout(){location.reload();}

/* EVIDENCE */
function addEvidence(){
let link=evidenceLink.value.trim();
if(!link) return;
evidenceArray.push(link);
evidencePreview.innerHTML+=`<div>${link}</div>`;
evidenceLink.value="";
}

/* SAVE REPORT */
async function saveReport(){
let data={
mission:missionName.value,
date:date.value,
detail:reportDetail.value,
intel:intelInfo.value,
agents:agentsInvolved.value,
status:status.value,
evidence:evidenceArray.join(" | "),
author:currentUser.codeName
};
await fetch(API_URL,{method:"POST",body:JSON.stringify(data)});
alert("Report Saved");
}

/* LOAD FILES */
async function loadFiles(){
const res=await fetch(`https://docs.google.com/spreadsheets/d/${DATA_SHEET_ID}/gviz/tq?tqx=out:json`);
const text=await res.text();
const json=JSON.parse(text.substring(text.indexOf("{"), text.lastIndexOf("}")+1));
allFiles=json.table.rows;
renderFiles(allFiles);
}

function renderFiles(rows){
filesList.innerHTML="";
rows.forEach(r=>{
let mission=r.c[0]?.v||"";
let status=r.c[4]?.v||"";
filesList.innerHTML+=`
<div class="file-card">
<b>${mission}</b><br>
Status: ${status}<br><br>
<button onclick="alert('Open View Mode')">View</button>
</div>`;
});
}

function filterFiles(){
let val=fileSearchInput.value.toLowerCase();
let filtered=allFiles.filter(r=>(r.c[0]?.v||"").toLowerCase().includes(val));
renderFiles(filtered);
}

/* CONTRIBUTOR */
function filterAgents(){
let name=agentSearchInput.value.toLowerCase();
let missions=[];
allFiles.forEach(r=>{
let agents=r.c[3]?.v||"";
if(agents.toLowerCase().includes(name)){
missions.push(r.c[0]?.v);
}});
agentResult.innerHTML=`<b>Total Missions:</b> ${missions.length}<br>`+
missions.map(m=>`- ${m}`).join("<br>");
}

</script>
</body>
</html>
