<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>BRO - SERVER BADAI</title>

<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700;900&family=Rajdhani:wght@500;700&display=swap" rel="stylesheet">

<style>

*{
  margin:0;
  padding:0;
  box-sizing:border-box;
}

body{
  width:100%;
  height:100vh;
  overflow:hidden;

  background:
    linear-gradient(rgba(0,0,0,0.72), rgba(0,0,0,0.88)),
    url('https://images.unsplash.com/photo-1500375592092-40eb2168fd21?q=80&w=1920&auto=format&fit=crop');

  background-size:cover;
  background-position:center;
  background-repeat:no-repeat;

  display:flex;
  justify-content:center;
  align-items:center;

  font-family:'Rajdhani', sans-serif;
  color:white;
}

/* OVERLAY */
.overlay{
  position:absolute;
  inset:0;
  background:rgba(0,0,0,0.25);
  backdrop-filter:blur(3px);
}

/* CONTAINER */
.container{
  position:relative;
  z-index:2;

  width:90%;
  max-width:900px;

  text-align:center;

  padding:50px 30px;

  border-radius:18px;

  background:rgba(8,17,36,0.55);

  border:1px solid rgba(255,255,255,0.08);

  box-shadow:
    0 0 40px rgba(0,0,0,0.45),
    0 0 80px rgba(0,140,255,0.15);
}

/* LOGO */
.logo{
  margin-bottom:25px;
  animation:flicker 2.5s infinite;
}

.logo img{
  width:180px;
  height:180px;
  object-fit:cover;

  border-radius:50%;

  border:4px solid rgba(255,255,255,0.12);

  box-shadow:
    0 0 20px rgba(0,191,255,0.65),
    0 0 45px rgba(0,140,255,0.45),
    0 0 90px rgba(0,94,255,0.35);
}

/* TITLE */
.title{
  font-family:'Orbitron', sans-serif;

  font-size:64px;
  font-weight:900;

  letter-spacing:6px;
  text-transform:uppercase;

  color:white;

  text-shadow:
    0 0 10px #00bfff,
    0 0 25px #008cff,
    0 0 45px #005eff;

  animation:pulse 2s infinite;
}

/* LINE */
.line{
  width:320px;
  height:3px;

  margin:28px auto;

  background:
    linear-gradient(
      to right,
      transparent,
      #00bfff,
      transparent
    );
}

/* SUBTITLE */
.subtitle{
  font-size:22px;
  font-weight:600;

  color:#d7e7ff;

  letter-spacing:2px;

  margin-bottom:8px;
}

/* STATUS */
.status{
  font-size:14px;

  color:#9db8db;

  letter-spacing:4px;

  text-transform:uppercase;
}

/* MUSIC BUTTON */
.music-btn{
  margin-top:30px;

  background:rgba(0,191,255,0.12);

  border:1px solid rgba(255,255,255,0.18);

  color:white;

  padding:12px 24px;

  border-radius:10px;

  font-size:15px;
  font-weight:700;
  letter-spacing:1px;

  cursor:pointer;

  transition:0.3s;
}

.music-btn:hover{
  background:rgba(0,191,255,0.28);
  transform:scale(1.04);
}

/* EFFECT */
@keyframes pulse{

  0%{
    transform:scale(1);
    opacity:1;
  }

  50%{
    transform:scale(1.03);
    opacity:0.88;
  }

  100%{
    transform:scale(1);
    opacity:1;
  }

}

@keyframes flicker{

  0%,18%,22%,25%,53%,57%,100%{
    opacity:1;
  }

  20%,24%,55%{
    opacity:0.45;
  }

}

/* MOBILE */
@media(max-width:768px){

  .container{
    padding:35px 20px;
  }

  .logo img{
    width:120px;
    height:120px;
  }

  .title{
    font-size:34px;
    letter-spacing:3px;
  }

  .subtitle{
    font-size:16px;
  }

  .line{
    width:180px;
  }

  .status{
    font-size:11px;
    letter-spacing:2px;
  }

}

</style>
</head>

<body>

<!-- BACKSOUND -->
<audio id="bgMusic" autoplay loop>
  <source src="https://raw.githubusercontent.com/jvxtgzg/MDI-SYSTEMS/main/DJ%20THAT%20SHOULD%20BE%20ME%20MENGKANE%20VIRAL%20TIKTOK%20ZURARMX.mp3" type="audio/mpeg">
</audio>

<div class="overlay"></div>

<div class="container">

  <!-- LOGO -->
  <div class="logo">
    <img 
      src="https://raw.githubusercontent.com/jvxtgzg/Data-Anggota-B-R-O/main/BRO%20LOGO.png"
      alt="BRO LOGO"
    >
  </div>

  <!-- TITLE -->
  <div class="title">
    SERVER SEDANG BADAI
  </div>

  <!-- LINE -->
  <div class="line"></div>

  <!-- SUBTITLE -->
  <div class="subtitle">
    Mohon tunggu hingga kondisi server kembali stabil
  </div>

  <!-- LINE -->
  <div class="line"></div>

  <!-- STATUS -->
  <div class="status">
    SYSTEM TEMPORARILY UNAVAILABLE
  </div>

  <!-- MUSIC BUTTON -->
  <button class="music-btn" onclick="toggleMusic()">
    🔊 PLAY / PAUSE MUSIC
  </button>

</div>

<script>

const music = document.getElementById("bgMusic");

music.volume = 0.4;

function toggleMusic(){

  if(music.paused){
    music.play();
  }else{
    music.pause();
  }

}

/* AUTO PLAY FIX */
window.addEventListener("click", () => {
  music.play();
}, { once:true });

</script>

</body>
</html>
